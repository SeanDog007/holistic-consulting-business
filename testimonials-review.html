const grid = document.getElementById('grid');
const countBadge = document.getElementById('countBadge');
const searchInput = document.getElementById('searchInput');
const filterBtns = document.querySelectorAll('.filter-btn');

let currentFilter = 'all';

function getInitials(name) {
  const parts = name.split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0][0].toUpperCase();
}

function renderCards(filter, search) {
  let filtered = testimonials;

  if (filter === 'high') filtered = filtered.filter(t => t.strength === 'high');
  if (filter === 'named') filtered = filtered.filter(t => !t.name.startsWith('Mastermind'));
  if (filter === 'video') filtered = filtered.filter(t => t.video_url);

  if (search) {
    const q = search.toLowerCase();
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.quote.toLowerCase().includes(q) ||
      t.headline.toLowerCase().includes(q) ||
      t.role.toLowerCase().includes(q)
    );
  }

  countBadge.textContent = filtered.length + ' Testimonial' + (filtered.length !== 1 ? 's' : '') + ' Shown';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No testimonials match your filters.</div>';
    return;
  }

  grid.innerHTML = filtered.map((t, i) => {
    const globalIdx = testimonials.indexOf(t) + 1;
    return `
      <div class="t-card strength-${t.strength}">
        <span class="card-num">#${globalIdx}</span>
        <div class="headline">${t.headline}</div>
        <div class="quote">"${t.quote}"</div>
        <div class="attribution">
          <div class="avatar">${getInitials(t.name)}</div>
          <div>
            <div class="name">${t.name}</div>
            <div class="role">${t.role}</div>
          </div>
        </div>
        <div class="meta-row">
          <span class="tag">${t.strength}</span>
          <span class="date-tag">${t.date_received}</span>
          ${t.video_url ? `<a class="video-link" href="${t.video_url}" target="_blank">&#9654; Video</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards(currentFilter, searchInput.value);
  });
});

searchInput.addEventListener('input', () => {
  renderCards(currentFilter, searchInput.value);
});

renderCards('all', '');
</script>
